name: smoke

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'docker/**'
      - 'wosac_preflight/**'
      - 'pyproject.toml'
      - '.github/workflows/smoke.yml'

jobs:
  wosac-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install official WOSAC metrics (no jax — not used by sim_agents_metrics)
        run: |
          pip install \
            "tensorflow==2.13.0" \
            "tensorflow_probability==0.21.0" \
            "numpy==1.23.5" \
            "pandas==1.5.3" \
            "scikit-learn==1.2.2" \
            "absl-py==1.4.0" \
            "immutabledict==2.2.0" \
            "protobuf>=3.20,<5"
          pip install --no-deps "waymo-open-dataset-tf-2-12-0==1.6.7"

      - name: Run official WOSAC smoke
        run: |
          mkdir -p receipts
          python docker/score_one.py --mode smoke --output receipts/smoke.json

      - name: Doctor summary
        run: |
          pip install -e .
          wosac-preflight doctor receipts/smoke.json

      - name: Commit real smoke receipt to dashboard
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp receipts/smoke.json dashboard/sample_receipt.json
          cp receipts/smoke.json dashboard/smoke_receipt.json
          git add dashboard/sample_receipt.json dashboard/smoke_receipt.json || true
          git diff --staged --quiet || git commit -m "Update dashboard with latest official smoke receipt [skip ci]"
          git push || true

      - uses: actions/upload-artifact@v4
        with:
          name: smoke-receipt
          path: receipts/smoke.json
